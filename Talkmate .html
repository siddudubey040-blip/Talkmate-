<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Talkmate - Connect with Friends</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0a0e1a; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { max-width: 450px; width: 100%; background: #0f1222; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.3); position: relative; }
        .page { display: none; padding-bottom: 70px; }
        .page.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; max-width: 450px; width: 100%; background: #0a0e1a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #1a1f2e; z-index: 100; }
        .nav-item { text-align: center; flex: 1; cursor: pointer; color: #6c7293; font-size: 12px; }
        .nav-item.active { color: #4a9eff; }
        .nav-icon { font-size: 24px; }
        .header { padding: 15px; border-bottom: 1px solid #1a1f2e; background: #0f1222; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-size: 20px; color: white; }
        .story-container { display: flex; overflow-x: auto; padding: 15px; gap: 15px; border-bottom: 1px solid #1a1f2e; background: #0f1222; }
        .story-circle { text-align: center; cursor: pointer; }
        .story-img { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(45deg, #4a9eff, #6c5ce7); padding: 3px; }
        .story-img img, .story-img video { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #0f1222; }
        .add-story { background: #4a9eff; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; }
        .story-name { font-size: 11px; margin-top: 5px; color: #a0a5c0; }
        .post-card { background: #121626; margin-bottom: 10px; border-radius: 12px; overflow: hidden; }
        .post-header { display: flex; align-items: center; padding: 12px; gap: 10px; cursor: pointer; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; background: #4a9eff; color: white; }
        .post-info { flex: 1; }
        .post-name { font-weight: bold; color: white; }
        .post-username { font-size: 12px; color: #8e94b5; }
        .gender-age { font-size: 11px; color: #8e94b5; margin-top: 2px; }
        .post-media { width: 100%; max-height: 400px; object-fit: cover; }
        .post-actions { padding: 10px; display: flex; gap: 20px; color: #a0a5c0; border-top: 1px solid #1a1f2e; }
        .post-actions span { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .post-actions span:hover { color: #4a9eff; }
        .comments-section { padding: 10px; border-top: 1px solid #1a1f2e; display: none; }
        .comments-section.show { display: block; }
        .comment-item { padding: 8px 0; display: flex; gap: 8px; border-bottom: 1px solid #1a1f2e; }
        .comment-text { color: #e0e0e0; font-size: 13px; }
        .comment-username { color: #4a9eff; font-weight: bold; font-size: 13px; }
        .add-comment { display: flex; gap: 10px; margin-top: 10px; }
        .add-comment input { flex: 1; padding: 8px; border-radius: 20px; border: none; background: #1a1f2e; color: white; }
        .add-comment button { background: #4a9eff; border: none; padding: 8px 15px; border-radius: 20px; color: white; cursor: pointer; }
        .user-item { display: flex; align-items: center; padding: 12px; gap: 12px; border-bottom: 1px solid #1a1f2e; background: #0f1222; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .user-info { flex: 1; cursor: pointer; }
        .user-name { font-weight: bold; color: white; }
        .user-username { font-size: 12px; color: #8e94b5; }
        .follow-btn, .message-btn { padding: 6px 16px; border-radius: 20px; border: none; cursor: pointer; }
        .follow-btn { background: #4a9eff; color: white; }
        .follow-btn.following { background: #2a2f42; color: #a0a5c0; }
        .message-btn { background: transparent; border: 1px solid #4a9eff; color: #4a9eff; }
        .profile-stats { display: flex; justify-content: space-around; padding: 20px; text-align: center; border-bottom: 1px solid #1a1f2e; }
        .stat { text-align: center; cursor: pointer; }
        .stat-number { font-size: 22px; font-weight: bold; color: white; }
        .stat-label { color: #8e94b5; font-size: 12px; }
        .profile-header { text-align: center; padding: 20px; }
        .profile-dp { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin: 0 auto 15px; cursor: pointer; border: 3px solid #4a9eff; }
        .small-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .form-group { padding: 10px 20px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: #0a0e1a; border: 1px solid #1a1f2e; color: white; border-radius: 8px; }
        .btn { width: calc(100% - 40px); margin: 10px 20px; padding: 12px; background: #4a9eff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .error { color: #ff6b6b; font-size: 12px; padding: 0 20px; }
        .badge { background: #ff4757; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; position: relative; top: -8px; }
        .plan-card { background: #121626; margin: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .plan-days { color: white; font-size: 16px; }
        .plan-price { font-size: 20px; font-weight: bold; color: #4a9eff; }
        .buy-btn { background: #4a9eff; border: none; padding: 8px 20px; border-radius: 20px; color: white; cursor: pointer; }
        
        .story-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .story-viewer-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .story-user-info {

            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 30px;
        }
        .story-user-avatar {
            width: 40px;
            height: 40px;

        }
        .story-user-name {
            color: white;

        }

        }
        .close-story-btn {
            background: rgba(0,0,0,0.6);

            color: white;
        }
        .story-media {
            width: 100%;
            height: 100%;

            justify-content: center;
            align-items: center;
        }
        .story-media img, .story-media video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .story-viewer-footer {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
        }
        .story-like-button {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .chat-window {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f1222;
            z-index: 200;
            display: none;
            flex-direction: column;
        }
        .chat-header {
            padding: 15px;
            background: #0a0e1a;
            border-bottom: 1px solid #1a1f2e;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .chat-header .back-btn {
            font-size: 24px;
            cursor: pointer;
            color: #4a9eff;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
        }
        .message.sent {
            background: #4a9eff;
            color: white;
            align-self: flex-end;
        }
        .message.received {
            background: #1a1f2e;
            color: #e0e0e0;
            align-self: flex-start;
        }
        .chat-input-area {
            padding: 10px;
            background: #0a0e1a;
            display: flex;
            gap: 10px;
            border-top: 1px solid #1a1f2e;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 25px;
            border: none;
            background: #1a1f2e;
            color: white;
        }
        .chat-input-area button {
            background: #4a9eff;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }
        
        /* Call Window */
        .call-window {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0e1a;
            z-index: 300;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .call-card {
            background: #121626;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            width: 85%;
            max-width: 320px;
        }
        .call-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #4a9eff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 20px;
        }
        .call-name {
            color: white;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .call-status {
            color: #8e94b5;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .call-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .call-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
        }
        .call-accept {
            background: #28a745;
            color: white;
        }
        .call-decline {
            background: #dc3545;
            color: white;
        }
        .call-end {
            background: #dc3545;
            color: white;
        }
        .call-btn:hover {
            transform: scale(1.05);
        }
        .incoming-call {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #121626;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            z-index: 400;
            width: 280px;
        }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0f1222; z-index: 200; display: none; flex-direction: column; overflow-y: auto;
        }
        .modal-header {
            padding: 15px; border-bottom: 1px solid #1a1f2e; display: flex; align-items: center; gap: 15px; background: #0a0e1a; width: 100%; position: sticky; top: 0;
        }
        .modal-header .back-btn { font-size: 24px; cursor: pointer; color: #4a9eff; }
        .modal-content { padding: 20px; width: 100%; }
        .edit-input { width: 100%; padding: 12px; background: #0a0e1a; border: 1px solid #1a1f2e; color: white; border-radius: 8px; margin-bottom: 15px; }
        .edit-label { color: #8e94b5; margin-bottom: 5px; display: block; font-size: 14px; }
        .payment-card {
            background: #121626;
            width: 90%;
            max-width: 350px;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin: auto;
        }
        .pay-btn {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        .settings-card { background: #121626; width: 90%; max-width: 350px; border-radius: 20px; overflow: hidden; margin: auto; }
        .settings-item { padding: 15px 20px; border-bottom: 1px solid #1a1f2e; cursor: pointer; color: white; }
        .notification-item { background: #121626; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .qr-img { width: 200px; height: 200px; margin: 10px auto; display: block; background: white; padding: 10px; border-radius: 12px; }
        .upi-details {
            background: #0a0e1a;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
        }
        .upi-details p {
            color: #4a9eff;
            font-size: 16px;
            font-weight: bold;
            word-break: break-all;
        }
        .screenshot-text {
            color: #ff9800;
            font-size: 14px;
            margin: 10px 0;
            font-weight: bold;
        }
        .timer-text {
            color: #4a9eff;
            font-size: 16px;
            margin: 10px 0;
            font-weight: bold;
        }
        .warning-text {
            color: #ff4757;
            font-size: 12px;
            margin: 5px 0;
        }
        .premium-note {
            color: #8e94b5;
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
        }
        .premium-badge {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
        .free-badge {
            background: #2a2f42;
            color: #8e94b5;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 14px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Login Page -->
    <div id="loginPage" class="page active">
        <div class="header"><h2>Talkmate</h2></div>
        <div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div>
        <div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div>
        <div class="error" id="loginError"></div>
        <button class="btn" onclick="handleLogin()">Login</button>
        <button class="btn" style="background:#2a2f42;" onclick="showSignup()">Create Account</button>
    </div>

    <!-- Signup Page -->
    <div id="signupPage" class="page">
        <div class="header"><h2>Talkmate</h2></div>
        <div class="form-group"><input type="text" id="fullname" placeholder="Full Name"></div>
        <div class="form-group"><input type="text" id="username" placeholder="Username"></div>
        <div class="form-group"><input type="number" id="age" placeholder="Age"></div>
        <div class="form-group"><input type="email" id="email" placeholder="Email"></div>
        <div class="form-group"><input type="password" id="password" placeholder="Password"></div>
        <div class="form-group"><input type="password" id="confirmPassword" placeholder="Confirm Password"></div>
        <div class="form-group">
            <select id="gender">
                <option value="Male">Male ♂️</option>
                <option value="Female">Female ♀️</option>
            </select>
        </div>
        <div class="form-group"><label style="color:#8e94b5;">Profile Picture</label><input type="file" id="signupDp" accept="image/*"></div>
        <div class="error" id="signupError"></div>
        <button class="btn" onclick="handleSignup()">Sign Up</button>
        <button class="btn" style="background:#2a2f42;" onclick="showLogin()">Back</button>
    </div>

    <!-- Home Page -->
    <div id="homePage" class="page">
        <div class="header"><h2>Talkmate</h2><span style="font-size:24px;cursor:pointer;" onclick="openNotifications()">🔔<span id="notifBadge" class="badge" style="display:none;">0</span></span></div>
        <div class="story-container" id="storyContainer"></div>
        <div id="postsContainer"></div>
    </div>

    <!-- Search Page -->
    <div id="searchPage" class="page">
        <div class="header"><h2>Search</h2></div>
        <div class="form-group"><input type="text" id="searchInput" placeholder="Search..." onkeyup="searchUsers()"></div>
        <div id="searchResults"></div>
    </div>

    <!-- Chat Page -->
    <div id="chatPage" class="page">
        <div class="header"><h2>Chats</h2></div>
        <div id="chatUsersList"></div>
        <div id="chatInfo" style="text-align:center;padding:20px;color:#8e94b5;"></div>
    </div>

    <!-- Premium Page -->
    <div id="premiumPage" class="page">
        <div class="header"><h2>Premium Plans</h2></div>
        <div id="plansContainer"></div>
        <div id="premiumMsg" style="text-align:center;padding:20px;color:#8e94b5;"></div>
        <div class="premium-note">✨ Buy premium to unlock unlimited chats, posts, stories & calls</div>
    </div>

    <!-- Profile Page -->
    <div id="profilePage" class="page">
        <div class="header"><h2>My Profile</h2><span style="font-size:24px;cursor:pointer;" onclick="openSettings()">⚙️</span></div>
        <div id="profileInfo"></div>
        <div class="profile-stats" id="profileStats"></div>
        <button class="btn" onclick="addPost()">+ Add Post (Premium only)</button>
        <div id="userPosts"></div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav" id="bottomNav" style="display:none;">
        <div class="nav-item" onclick="navigateTo('home')"><div class="nav-icon">🏠</div><div>Home</div></div>
        <div class="nav-item" onclick="navigateTo('search')"><div class="nav-icon">🔍</div><div>Search</div></div>
        <div class="nav-item" onclick="navigateTo('chat')"><div class="nav-icon">💬</div><div>Chat</div></div>
        <div class="nav-item" onclick="navigateTo('premium')"><div class="nav-icon">⭐</div><div>Premium</div></div>
        <div class="nav-item" onclick="navigateTo('profile')"><div class="nav-icon">👤</div><div>Profile</div></div>
    </div>
</div>

<script>
    // ==================== DATA ====================
    let users = JSON.parse(localStorage.getItem('users')) || [];
    let posts = JSON.parse(localStorage.getItem('posts')) || [];
    let stories = JSON.parse(localStorage.getItem('stories')) || [];
    let messages = JSON.parse(localStorage.getItem('messages')) || {};
    let notifications = JSON.parse(localStorage.getItem('notifications')) || [];
    let currentUser = null;
    let activeCall = null;
    let callRingtone = null;
    
    const UPI_ID = "siddharthdubey04093@oksbi";
    const UPI_NAME = "Siddharth Dubey";
    const APP_LINK = "https://talkmate.page.link/download";

    function getGenderIcon(g) { return g === 'Male' ? '♂️' : '♀️'; }
    function getGenderColor(g) { return g === 'Male' ? '#4a9eff' : '#ff6b9d'; }
    function getGenderAgeDisplay(g, a) { return `${getGenderIcon(g)} ${a} yrs`; }

    // ==================== SHARE APP FUNCTION - ONLY ONCE ====================
    function shareApp() {
        // Check if user has already shared before
        if (currentUser.hasShared === true) {
            alert("📱 You have already shared the app! +5 free chats already added.");
            return;
        }
        
        // Try native share first (mobile)
        if (navigator.share) {
            navigator.share({
                title: 'Talkmate',
                text: 'Join me on Talkmate - Connect with friends! Chat, share stories, make calls!',
                url: APP_LINK
            }).then(() => {
                // Add free chats only once
                currentUser.hasShared = true;
                currentUser.freeChatsLeft += 5;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                let allUsers = users.map(u => u.id === currentUser.id ? currentUser : u);
                localStorage.setItem('users', JSON.stringify(allUsers));
                alert("🎉 +5 free chats added! Thank you for sharing!");
                showChat();
            }).catch((err) => {
                console.log('Share cancelled', err);
            });
        } else {
            // Fallback for browsers that don't support share - copy link
            let tempInput = document.createElement('input');
            tempInput.value = APP_LINK;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            
            // Add free chats only once
            currentUser.hasShared = true;
            currentUser.freeChatsLeft += 5;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            let allUsers = users.map(u => u.id === currentUser.id ? currentUser : u);
            localStorage.setItem('users', JSON.stringify(allUsers));
            alert("📋 App link copied!\n🎉 +5 free chats added!");
            showChat();
        }
    }

    // ==================== CALLING FEATURE ====================
    function playRingtone() {
        if (callRingtone) {
            callRingtone.pause();
            callRingtone = null;
        }
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.type = 'sine';
        oscillator.frequency.value = 440;
        gain.gain.value = 0.3;
        oscillator.start();
        
        let interval = setInterval(() => {
            if (!activeCall) {
                clearInterval(interval);
                oscillator.stop();
                audioContext.close();
            }
        }, 1000);
        
        callRingtone = { oscillator, audioContext, interval };
    }
    
    function stopRingtone() {
        if (callRingtone) {
            clearInterval(callRingtone.interval);
            callRingtone.oscillator.stop();
            callRingtone.audioContext.close();
            callRingtone = null;
        }
    }
    
    function makeCall(userId, userName, userGender, userProfilePic) {
        if (!currentUser.isPremium) {
            alert("⭐ Premium required to make calls! Buy premium to unlock calling feature.");
            navigateTo('premium');
            return;
        }
        
        let callWindow = document.createElement('div'); callWindow.className = 'call-window';
        callWindow.innerHTML = `
            <div class="call-card">
                <div class="call-avatar" style="background:${getGenderColor(userGender)}">${getGenderIcon(userGender)}</div>
                <div class="call-name">${userName}</div>
                <div class="call-status">Calling...</div>
                <div class="call-buttons">

    function showIncomingCall(callerId, callerName, callerGender, callerProfilePic) {

    function acceptCall(callerId, callerName, callerGender) {

        document.body.appendChild(callWindow);
        callWindow.style.display = 'flex';
        activeCall = { type: 'active', window: callWindow, userId: callerId, userName: callerName };

    function declineCall() {
        stopRingtone();
        if (activeCall && activeCall.window) activeCall.window.remove();
        activeCall = null;
        alert("📞 Call declined");
    }
    
    function endCall() {
        stopRingtone();
        if (activeCall && activeCall.window) activeCall.window.remove();
        activeCall = null;
        alert("📞 Call ended");
    }

    function updateNotifBadge() {

    // ==================== CHAT ====================
    function openChat(userId) {
        if(!currentUser.isPremium && currentUser.freeChatsLeft <= 0) { alert("No free chats left. Buy premium."); navigateTo('premium'); return; }
        if(!currentUser.isPremium) {
            currentUser.freeChatsLeft--;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            showChat();
        }
        let target = users.find(u => u.id === userId);
        let win = document.createElement('div'); win.className = 'chat-window';
        win.innerHTML = `
            <div class="chat-header">
                <span class="back-btn" onclick="this.parentElement.parentElement.remove()">←</span>
                <div style="color:white; font-weight:bold;">${target.fullname} ${getGenderIcon(target.gender)}</div>
                <button style="margin-left:auto; background:#2a2f42; border:none; padding:8px 16px; border-radius:20px; color:white;" onclick="makeCall(${target.id}, '${target.fullname}', '${target.gender}', '${target.profilePic || ''}')">📞 Call</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button onclick="sendMessageInChat(${userId})">Send</button>
            </div>
        `;
        document.body.appendChild(win);
        win.style.display = 'flex';
        window.currentChatUserId = userId;
        loadChatMessagesInChat(userId);
    }

    function loadChatMessagesInChat(userId) {
        let key = [currentUser.id, userId].sort().join('_');
        let msgs = messages[key] || [];
        let container = document.getElementById('chatMessages');
        if(container) {
            container.innerHTML = '';
            msgs.forEach(m => { let div = document.createElement('div'); div.className = `message ${m.senderId === currentUser.id ? 'sent' : 'received'}`; div.innerText = m.text; container.appendChild(div); });
            container.scrollTop = container.scrollHeight;
        }
    }

    function sendMessageInChat(userId) {
        let input = document.getElementById('messageInput');
        let text = input.value.trim();
        if(!text) return;
        let key = [currentUser.id, userId].sort().join('_');
        if(!messages[key]) messages[key] = [];
        messages[key].push({ text, senderId: currentUser.id, timestamp: Date.now() });
        localStorage.setItem('messages', JSON.stringify(messages));
        input.value = '';
        loadChatMessagesInChat(userId);
    }

    // ==================== STORY ====================
    function viewStory(storyId) {
        let story = stories.find(s => s.id === storyId);
        if(!story) return;
        let user = users.find(u => u.id === story.userId);
        let viewer = document.createElement('div'); viewer.className = 'story-viewer';
        viewer.innerHTML = `
            <div class="story-viewer-header">
                <div class="story-user-info">
                    ${user.profilePic ? `<img src="${user.profilePic}" class="story-user-avatar">` : `<div class="story-user-avatar" style="background:${getGenderColor(user.gender)}; display:flex; align-items:center; justify-content:center;">${getGenderIcon(user.gender)}</div>`}
                    <div><div class="story-user-name">${user.username}</div><div class="story-user-age">${user.age} years</div></div>
                </div>
                <div class="close-story-btn" onclick="this.closest('.story-viewer').remove()">✖️</div>
            </div>
            <div class="story-media">${story.mediaType === 'image' ? `<img src="${story.mediaUrl}">` : `<video controls autoplay><source src="${story.mediaUrl}"></video>`}</div>
            <div class="story-viewer-footer"><button class="story-like-button" onclick="likeStoryFromViewer(${story.id}, this)">❤️ Like Story</button></div>

        document.body.appendChild(viewer);

    function likeStoryFromViewer(storyId, btn) {
        let story = stories.find(s => s.id === storyId);
        if(story && story.userId !== currentUser.id && !story.likes?.includes(currentUser.id)) {
            if(!story.likes) story.likes = [];
            story.likes.push(currentUser.id);
            localStorage.setItem('stories', JSON.stringify(stories));
            btn.innerHTML = '❤️ Liked!';
            btn.style.background = '#ff4757';
            addNotification('like_story', currentUser.id, storyId, story.userId);
        }
    }

    function addStory() {
        if(!currentUser.isPremium) { alert("⭐ Premium required!"); navigateTo('premium'); return; }
        let inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*,video/*';

            let file = e.target.files[0];

                let url = URL.createObjectURL(file);
                let mediaType = file.type.startsWith('image') ? 'image' : 'video';
                stories.unshift({ id: Date.now(), userId: currentUser.id, mediaType, mediaUrl: url, timestamp: Date.now(), likes: [] });
                localStorage.setItem('stories', JSON.stringify(stories));
                showHome();
            }
        };
        inp.click();
    }

    // ==================== EDIT PROFILE ====================
    function openEditProfile() {
        let modal = document.createElement('div'); modal.className = 'modal-overlay';

                <label class="edit-label">Email</label><input type="email" id="editEmail" class="edit-input" value="${escapeHtml(currentUser.email || '')}">

                </select>

        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';

    function saveProfileChanges() {
        let newFullname = document.getElementById('editFullname')?.value.trim();
        let newUsername = document.getElementById('editUsername')?.value.trim();
        let newEmail = document.getElementById('editEmail')?.value.trim();
        let newAge = document.getElementById('editAge')?.value;
        let newGender = document.getElementById('editGender')?.value;
        let newPassword = document.getElementById('editPassword')?.value;
        if(!newFullname || !newUsername || !newEmail || !newAge) { alert("All fields required!"); return; }
        if(users.find(u => u.username === newUsername && u.id !== currentUser.id)) { alert("Username taken!"); return; }
        if(users.find(u => u.email === newEmail && u.id !== currentUser.id)) { alert("Email in use!"); return; }
        currentUser.fullname = newFullname;
        currentUser.username = newUsername;
        currentUser.email = newEmail;
        currentUser.age = parseInt(newAge);
        currentUser.gender = newGender;
        if(newPassword) currentUser.password = newPassword;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        let allUsers = users.map(u => u.id === currentUser.id ? currentUser : u);
        localStorage.setItem('users', JSON.stringify(allUsers));
        document.querySelector('.modal-overlay')?.remove();
        showProfile(); showSearch(); showHome();
        alert("✅ Profile updated!");
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function openNotifications() {
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-header"><span class="back-btn" onclick="this.parentElement.parentElement.remove()">←</span><h3 style="color:white;">Notifications</h3></div><div class="modal-content" id="notifList"></div>`;
        document.body.appendChild(modal);
        let html = '';
        if(notifications.length === 0) html = '<div style="color:#8e94b5;text-align:center;padding:20px;">No notifications</div>';
        else {
            [...notifications].reverse().forEach(n => {
                let from = users.find(u => u.id === n.fromUserId);
                if(from) html += `<div class="notification-item"><div style="background:${getGenderColor(from.gender)};width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;">${getGenderIcon(from.gender)}</div><div style="flex:1;color:white;">${n.type === 'follow' ? `${from.username} followed you` : (n.type === 'like_post' ? `${from.username} liked your post` : (n.type === 'comment_post' ? `${from.username} commented` : `${from.username} liked your story`))}</div></div>`;
                n.read = true;
            });
            localStorage.setItem('notifications', JSON.stringify(notifications));
        }
        modal.querySelector('#notifList').innerHTML = html;
        modal.style.display = 'flex';
        updateNotifBadge();
    }

    function followUser(userId) {
        let target = users.find(u => u.id === userId);
        if(currentUser.following.includes(userId)) {
            currentUser.following = currentUser.following.filter(id => id !== userId);
            target.followers = target.followers.filter(id => id !== currentUser.id);
        } else {
            currentUser.following.push(userId);
            target.followers.push(currentUser.id);
            addNotification('follow', currentUser.id, userId, target.id);
        }
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        showSearch(); showProfile(); showHome(); showChat();
    }

    function likePost(postId) {
        let post = posts.find(p => p.id === postId);
        if(post) {
            if(!post.likes) post.likes = [];
            if(post.likes.includes(currentUser.id)) post.likes = post.likes.filter(id => id !== currentUser.id);
            else { post.likes.push(currentUser.id); if(post.userId !== currentUser.id) addNotification('like_post', currentUser.id, postId, post.userId); }
            localStorage.setItem('posts', JSON.stringify(posts));
            showHome();
        }
    }

    function addComment(postId) {
        let input = document.getElementById(`comment-input-${postId}`);
        let comment = input.value.trim();
        if(!comment) return;
        let post = posts.find(p => p.id === postId);
        if(post) {
            if(!post.comments) post.comments = [];
            post.comments.push({ userId: currentUser.id, username: currentUser.username, text: comment });
            if(post.userId !== currentUser.id) addNotification('comment_post', currentUser.id, postId, post.userId, comment);
            localStorage.setItem('posts', JSON.stringify(posts));
            input.value = '';
            showHome();
        }
    }

    function toggleComments(id) { let d = document.getElementById(`comments-${id}`); if(d) d.classList.toggle('show'); }

    function addPost() {
        if(!currentUser.isPremium) { alert("⭐ Premium required to post!"); navigateTo('premium'); return; }
        let inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*,video/*';
        inp.onchange = e => {
            let file = e.target.files[0];
            if(file) {
                let url = URL.createObjectURL(file);
                let mediaType = file.type.startsWith('image') ? 'image' : 'video';
                let caption = prompt("Write a caption");
                posts.unshift({ id: Date.now(), userId: currentUser.id, content: caption || "", mediaType, mediaUrl: url, likes: [], comments: [], timestamp: Date.now() });
                localStorage.setItem('posts', JSON.stringify(posts));
                showProfile(); showHome();
                alert("Post added successfully!");
            }
        };
        inp.click();
    }

    function editPost(id) { let p = posts.find(p => p.id === id); if(p && p.userId === currentUser.id) { let c = prompt("Edit caption:", p.content); if(c !== null) p.content = c; localStorage.setItem('posts', JSON.stringify(posts)); showProfile(); showHome(); } }
    function deletePost(id) { if(confirm("Delete this post?")) { posts = posts.filter(p => p.id !== id); localStorage.setItem('posts', JSON.stringify(posts)); showProfile(); showHome(); } }
    function sharePost(id) { alert("📤 Share link copied!"); }

    function updateProfilePicture() {
        let inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = e => {
            if(e.target.files[0]) {
                let url = URL.createObjectURL(e.target.files[0]);

                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                let allUsers = users.map(u => u.id === currentUser.id ? currentUser : u);
                localStorage.setItem('users', JSON.stringify(allUsers));
                showProfile(); showHome();
                alert("Profile picture updated!");
            }
        };
        inp.click();
    }

    function showHome() {
        let storyHtml = `<div class="story-circle" onclick="addStory()"><div class="story-img add-story">+</div><div class="story-name">Your Story</div></div>`;
        users.filter(u => currentUser.following.includes(u.id)).forEach(u => {
            let s = stories.find(s => s.userId === u.id);
            if(s) storyHtml += `<div class="story-circle" onclick="viewStory(${s.id})"><div class="story-img">${u.profilePic ? `<img src="${u.profilePic}">` : `<div style="width:100%;height:100%;border-radius:50%;background:${getGenderColor(u.gender)};display:flex;align-items:center;justify-content:center;">${getGenderIcon(u.gender)}</div>`}</div><div class="story-name">${u.username}</div></div>`;
        });

                if(p.comments) p.comments.forEach(c => comments += `<div class="comment-item"><span class="comment-username">@${c.username}</span><span class="comment-text">${c.text}</span></div>`);
                postsHtml += `<div class="post-card">
                    <div class="post-header" onclick="openUserProfile(${u.id})">

                    <div id="comments-${p.id}" class="comments-section">${comments}<div class="add-comment"><input type="text" id="comment-input-${p.id}" placeholder="Write a comment..."><button onclick="addComment(${p.id})">Post</button></div></div>

            }
        });
        document.getElementById('postsContainer').innerHTML = postsHtml || '<div style="padding:20px;text-align:center;color:#8e94b5;">No posts yet</div>';

    function showSearch() {
        let html = '';
        users.filter(u => u.id !== currentUser.id).forEach(u => {
            let isFollow = currentUser.following.includes(u.id);
            let isMutual = currentUser.following.includes(u.id) && u.followers.includes(currentUser.id);
            html += `<div class="user-item"><div class="user-avatar" style="background:${getGenderColor(u.gender)};display:flex;align-items:center;justify-content:center;" onclick="openUserProfile(${u.id})">${getGenderIcon(u.gender)}</div>
                <div class="user-info" onclick="openUserProfile(${u.id})"><div class="user-name">${u.fullname}</div><div class="user-username">@${u.username}</div><div class="gender-age">${getGenderAgeDisplay(u.gender, u.age)}</div></div>
                <button class="follow-btn ${isFollow ? 'following' : ''}" onclick="followUser(${u.id})">${isFollow ? 'Following' : 'Follow'}</button>
                ${isMutual ? `<button class="message-btn" onclick="openChat(${u.id})">Message</button>` : ''}</div>`;
        });
        document.getElementById('searchResults').innerHTML = html;
    }

    function searchUsers() {
        let q = document.getElementById('searchInput').value.toLowerCase();
        let filtered = users.filter(u => u.id !== currentUser.id && (u.username.toLowerCase().includes(q) || u.fullname.toLowerCase().includes(q)));
        let html = '';
        filtered.forEach(u => {
            let isFollow = currentUser.following.includes(u.id);
            let isMutual = currentUser.following.includes(u.id) && u.followers.includes(currentUser.id);
            html += `<div class="user-item"><div class="user-avatar" style="background:${getGenderColor(u.gender)};display:flex;align-items:center;justify-content:center;" onclick="openUserProfile(${u.id})">${getGenderIcon(u.gender)}</div>
                <div class="user-info" onclick="openUserProfile(${u.id})"><div class="user-name">${u.fullname}</div><div class="user-username">@${u.username}</div><div class="gender-age">${getGenderAgeDisplay(u.gender, u.age)}</div></div>
                <button class="follow-btn ${isFollow ? 'following' : ''}" onclick="followUser(${u.id})">${isFollow ? 'Following' : 'Follow'}</button>
                ${isMutual ? `<button class="message-btn" onclick="openChat(${u.id})">Message</button>` : ''}</div>`;
        });
        document.getElementById('searchResults').innerHTML = html;
    }

    function showChat() {
        let mutual = users.filter(u => currentUser.following.includes(u.id) && u.followers.includes(currentUser.id));
        let html = '';
        mutual.forEach(u => html += `<div class="user-item"><div class="user-avatar" style="background:${getGenderColor(u.gender)};display:flex;align-items:center;justify-content:center;" onclick="openUserProfile(${u.id})">${getGenderIcon(u.gender)}</div>
            <div class="user-info" onclick="openUserProfile(${u.id})"><div class="user-name">${u.fullname}</div><div class="user-username">@${u.username}</div><div class="gender-age">${getGenderAgeDisplay(u.gender, u.age)}</div></div>
            <button class="message-btn" onclick="openChat(${u.id})">💬 Chat</button></div>`);
        document.getElementById('chatUsersList').innerHTML = html || '<div style="padding:20px;text-align:center;color:#8e94b5;">Follow each other to start chatting</div>';
        let left = currentUser.freeChatsLeft || 0;
        document.getElementById('chatInfo').innerHTML = currentUser.isPremium ? "✅ Premium: Unlimited chats\n📞 Call available" : `📱 Free chats left: ${left}\n⭐ Buy premium for unlimited chat + calls`;
    }

    function showPremium() {
        let plans = [{ d: 15, p: 25 }, { d: 30, p: 50 }, { d: 60, p: 90 }, { d: 90, p: 150 }, { d: 180, p: 300 }];
        let html = '';
        plans.forEach(p => html += `<div class="plan-card"><span class="plan-days">${p.d} days</span><span class="plan-price">₹${p.p}</span><button class="buy-btn" onclick="makePayment(${p.d}, ${p.p})">Buy Premium</button></div>`);
        document.getElementById('plansContainer').innerHTML = html;
        document.getElementById('premiumMsg').innerHTML = currentUser.isPremium ? "🎉 Premium active! Unlimited posts & chats." : "⭐ Upgrade to post photos/videos & unlimited chat";
    }

    function showProfile() {
        let stats = `<div class="stat" onclick="showFollowersList(${currentUser.id})"><div class="stat-number">${currentUser.followers.length}</div><div class="stat-label">Followers</div></div>
            <div class="stat" onclick="showFollowingList(${currentUser.id})"><div class="stat-number">${currentUser.following.length}</div><div class="stat-label">Following</div></div>
            <div class="stat"><div class="stat-number">${posts.filter(p => p.userId === currentUser.id).length}</div><div class="stat-label">Posts</div></div>`;
        document.getElementById('profileStats').innerHTML = stats;
        
        let premiumHtml = '';
        if (currentUser.isPremium) {
            premiumHtml = '<div class="premium-badge">⭐ Premium User</div>';
        } else {
            premiumHtml = '<div class="free-badge">Free User - <span style="color:#4a9eff;" onclick="navigateTo(\'premium\')">Upgrade to Premium</span></div>';
        }
        
        document.getElementById('profileInfo').innerHTML = `<div class="profile-header">
            ${currentUser.profilePic ? `<img src="${currentUser.profilePic}" class="profile-dp" onclick="updateProfilePicture()">` : `<div style="font-size:60px;color:${getGenderColor(currentUser.gender)};cursor:pointer;" onclick="updateProfilePicture()">${getGenderIcon(currentUser.gender)}</div>`}
            <h3 style="color:white;">${escapeHtml(currentUser.fullname)}</h3>
            <p style="color:#8e94b5;">@${escapeHtml(currentUser.username)}</p>
            <p style="color:${getGenderColor(currentUser.gender)}; margin:5px 0;">${getGenderAgeDisplay(currentUser.gender, currentUser.age)}</p>
            ${premiumHtml}
            <p style="font-size:12px;color:#4a9eff;cursor:pointer; margin-top:10px;" onclick="updateProfilePicture()">📷 Tap to change DP</p>
        </div>`;
        
        let myPosts = posts.filter(p => p.userId === currentUser.id);
        let postsHtml = '<div style="padding:10px;">';
        if (myPosts.length === 0) {
            postsHtml += '<p style="text-align:center;color:#8e94b5;padding:20px;">No posts yet. Buy premium to post!</p>';
        } else {
            myPosts.forEach(p => {
                let media = '';
                if(p.mediaType === 'image') media = `<img src="${p.mediaUrl}" style="width:100%;border-radius:8px;margin-top:5px;">`;
                else if(p.mediaType === 'video') media = `<video controls style="width:100%;border-radius:8px;margin-top:5px;"><source src="${p.mediaUrl}"></video>`;
                postsHtml += `<div style="background:#121626;padding:10px;border-radius:8px;margin-bottom:10px;">
                    ${p.content ? `<p style="color:white;">${escapeHtml(p.content)}</p>` : ''}
                    ${media}
                    <div style="margin-top:10px;">
                        <button onclick="editPost(${p.id})" style="background:#2a2f42;color:white;border:none;padding:5px 12px;border-radius:5px;">✏️ Edit</button>
                        <button onclick="deletePost(${p.id})" style="background:#2a2f42;color:#ff6b6b;border:none;padding:5px 12px;border-radius:5px;">🗑️ Delete</button>
                        <button onclick="sharePost(${p.id})" style="background:#2a2f42;color:white;border:none;padding:5px 12px;border-radius:5px;">🔗 Share</button>
                    </div>
                </div>`;
            });
        }
        postsHtml += '</div>';
        document.getElementById('userPosts').innerHTML = postsHtml;
    }

    // ==================== FOLLOWERS / FOLLOWING LIST ====================
    function showFollowersList(id) {
        let user = users.find(u => u.id === id);
        if(!user) return;
        
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-header">
                <span class="back-btn" onclick="this.parentElement.parentElement.remove()">←</span>
                <h3 style="color:white;">Followers (${user.followers.length})</h3>
            </div>
            <div class="modal-content" style="padding:0;">
                ${user.followers.length === 0 ? '<div style="padding:20px;text-align:center;color:#8e94b5;">No followers yet</div>' : ''}
                ${user.followers.map(fid => {
                    let f = users.find(u => u.id === fid);
                    return f ? `<div class="user-item" style="cursor:pointer;" onclick="openUserProfile(${f.id}); this.parentElement.parentElement.remove();">
                        ${f.profilePic ? `<img src="${f.profilePic}" class="user-avatar">` : `<div class="user-avatar" style="background:${getGenderColor(f.gender)};display:flex;align-items:center;justify-content:center;">${getGenderIcon(f.gender)}</div>`}
                        <div class="user-info">
                            <div class="user-name">${escapeHtml(f.fullname)}</div>
                            <div class="user-username">@${escapeHtml(f.username)}</div>
                            <div class="gender-age">${getGenderAgeDisplay(f.gender, f.age)}</div>
                        </div>
                    </div>` : ''
                }).join('')}
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
    }
    
    function showFollowingList(id) {
        let user = users.find(u => u.id === id);
        if(!user) return;
        
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-header">
                <span class="back-btn" onclick="this.parentElement.parentElement.remove()">←</span>
                <h3 style="color:white;">Following (${user.following.length})</h3>
            </div>
            <div class="modal-content" style="padding:0;">
                ${user.following.length === 0 ? '<div style="padding:20px;text-align:center;color:#8e94b5;">Not following anyone yet</div>' : ''}
                ${user.following.map(fid => {
                    let f = users.find(u => u.id === fid);
                    return f ? `<div class="user-item" style="cursor:pointer;" onclick="openUserProfile(${f.id}); this.parentElement.parentElement.remove();">
                        ${f.profilePic ? `<img src="${f.profilePic}" class="user-avatar">` : `<div class="user-avatar" style="background:${getGenderColor(f.gender)};display:flex;align-items:center;justify-content:center;">${getGenderIcon(f.gender)}</div>`}
                        <div class="user-info">
                            <div class="user-name">${escapeHtml(f.fullname)}</div>
                            <div class="user-username">@${escapeHtml(f.username)}</div>
                            <div class="gender-age">${getGenderAgeDisplay(f.gender, f.age)}</div>
                        </div>
                    </div>` : ''
                }).join('')}
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
    }

    function openUserProfile(userId) {
        let user = users.find(u => u.id === userId);
        if(!user) return;
        let isFollow = currentUser.following.includes(userId);
        let isMutual = currentUser.following.includes(userId) && user.followers.includes(currentUser.id);
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-header"><span class="back-btn" onclick="this.parentElement.remove()">←</span><h3 style="color:white;">Profile</h3></div>
            <div style="text-align:center;padding:20px;">
                ${user.profilePic ? `<img src="${user.profilePic}" style="width:100px;height:100px;border-radius:50%;">` : `<div style="font-size:60px;color:${getGenderColor(user.gender)}">${getGenderIcon(user.gender)}</div>`}
                <h3 style="color:white;">${escapeHtml(user.fullname)}</h3>
                <p style="color:#8e94b5;">@${escapeHtml(user.username)}</p>
                <p style="color:${getGenderColor(user.gender)};">${getGenderAgeDisplay(user.gender, user.age)}</p>
                ${user.isPremium ? '<div class="premium-badge" style="display:inline-block;">⭐ Premium User</div>' : '<div class="free-badge" style="display:inline-block;">Free User</div>'}
                <div style="margin-top:15px;">
                    <button class="follow-btn ${isFollow ? 'following' : ''}" onclick="followUser(${userId}); this.parentElement.parentElement.parentElement.remove();">${isFollow ? 'Following' : 'Follow'}</button>
                    ${isMutual ? `<button class="message-btn" onclick="openChat(${userId})">Message</button>` : ''}
                </div>
            </div>
            <div class="profile-stats">
                <div class="stat" onclick="showFollowersList(${userId}); this.parentElement.remove();"><div class="stat-number">${user.followers.length}</div><div class="stat-label">Followers</div></div>
                <div class="stat" onclick="showFollowingList(${userId}); this.parentElement.remove();"><div class="stat-number">${user.following.length}</div><div class="stat-label">Following</div></div>
                <div class="stat"><div class="stat-number">${posts.filter(p => p.userId === userId).length}</div><div class="stat-label">Posts</div></div>
            </div>`;
        document.body.appendChild(modal);
        modal.style.display = 'flex';
    }

    function openSettings() {
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div style="display:flex;justify-content:center;align-items:center;min-height:100vh;"><div class="settings-card">
            <div class="settings-item" onclick="this.parentElement.parentElement.parentElement.remove(); openEditProfile()">✏️ Edit Profile</div>
            <div class="settings-item" onclick="shareApp(); this.parentElement.parentElement.parentElement.remove();">📤 Share App (+5 Chats - One Time)</div>
            <div class="settings-item" onclick="logout()">🚪 Logout</div>
            <div class="settings-item" onclick="clearData()">🗑️ Clear Cache</div>
            <div class="settings-item" onclick="this.parentElement.parentElement.parentElement.remove()">❌ Cancel</div>
        </div></div>`;
        document.body.appendChild(modal); modal.style.display = 'flex';
    }

    function logout() { localStorage.removeItem('currentUser'); location.reload(); }
    function clearData() { if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); } }

    function handleSignup() {
        let fullname = document.getElementById('fullname').value;
        let username = document.getElementById('username').value;
        let age = document.getElementById('age').value;
        let email = document.getElementById('email').value;
        let password = document.getElementById('password').value;
        let confirm = document.getElementById('confirmPassword').value;
        let gender = document.getElementById('gender').value;
        let dpFile = document.getElementById('signupDp').files[0];
        if(!fullname || !username || !age || !email || !password) { document.getElementById('signupError').innerText = "All fields required"; return; }
        if(password !== confirm) { document.getElementById('signupError').innerText = "Passwords don't match"; return; }
        if(users.find(u => u.email === email)) { document.getElementById('signupError').innerText = "Email already exists"; return; }
        if(users.find(u => u.username === username)) { document.getElementById('signupError').innerText = "Username already taken"; return; }
        let profilePicUrl = dpFile ? URL.createObjectURL(dpFile) : null;
        users.push({ id: Date.now(), fullname, username, age: parseInt(age), email, password, gender, profilePic: profilePicUrl, followers: [], following: [], isPremium: false, freeChatsLeft: 10, hasShared: false });
        localStorage.setItem('users', JSON.stringify(users));
        alert("✅ Signup successful! Please login.");
        showLogin();
    }

    function handleLogin() {
        let user = users.find(u => u.email === document.getElementById('loginEmail').value && u.password === document.getElementById('loginPassword').value);
        if(!user) { document.getElementById('loginError').innerText = "Invalid email or password"; return; }
        currentUser = user; localStorage.setItem('currentUser', JSON.stringify(currentUser));
        document.getElementById('loginPage').classList.remove('active'); document.getElementById('bottomNav').style.display = 'flex'; loadMainApp();
    }

    function showLogin() { document.getElementById('signupPage').classList.remove('active'); document.getElementById('loginPage').classList.add('active'); }
    function showSignup() { document.getElementById('loginPage').classList.remove('active'); document.getElementById('signupPage').classList.add('active'); }
    function navigateTo(page) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(page + 'Page').classList.add('active'); if(page === 'home') showHome(); if(page === 'search') showSearch(); if(page === 'chat') showChat(); if(page === 'premium') showPremium(); if(page === 'profile') showProfile(); }
    function loadMainApp() { showHome(); document.getElementById('homePage').classList.add('active'); updateNotifBadge(); }

    function initDemo() {
        if(users.length === 0) {
            users.push({ id: 1, fullname: "John Doe", username: "john", age: 25, email: "john@test.com", password: "123", gender: "Male", profilePic: null, followers: [], following: [], isPremium: false, freeChatsLeft: 10, hasShared: false });
            users.push({ id: 2, fullname: "Jane Smith", username: "jane", age: 23, email: "jane@test.com", password: "123", gender: "Female", profilePic: null, followers: [], following: [], isPremium: true, freeChatsLeft: 0, hasShared: false });
            posts.push({ id: 1, userId: 1, content: "Welcome to Talkmate!", mediaType: "text", mediaUrl: null, likes: [], comments: [] });
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('posts', JSON.stringify(posts));
        }
    }
    initDemo();

    let stored = localStorage.getItem('currentUser');
    if(stored) { currentUser = JSON.parse(stored); let fresh = users.find(u => u.id === currentUser.id); if(fresh) { currentUser = fresh; document.getElementById('loginPage').classList.remove('active'); document.getElementById('bottomNav').style.display = 'flex'; loadMainApp(); } }
</script>
</body>
</html>
